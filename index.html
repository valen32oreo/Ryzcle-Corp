<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryzcle Corp.</title>

<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
<link rel="icon" type="image/png" href="images/Logo 1-Photoroom.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

<style>
  body {
    font-family: 'Inter', sans-serif;
    overflow: hidden; /* Lock scroll */
    height: 100vh; /* Pastikan tinggi layar penuh */
  }
  .font-headline {
    font-family: 'Space Grotesk', sans-serif;
  }
  .bg-light-grid {
    background-image:
      linear-gradient(to right, rgba(226,232,240,0.6) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(226,232,240,0.6) 1px, transparent 1px);
    background-size: 48px 48px;
  }
</style>
</head>

<body class="bg-light-grid flex flex-col items-center relative" x-data="{ open: false }">

<header
    :class="open ? 'bg-white shadow-md' : 'bg-transparent'"
    class="fixed top-0 left-0 w-full z-50 transition-all duration-300">
    <nav class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
        <a href="javascript:void(0)" class="flex items-center gap-3">
            <img src="images/Logo 1-Photoroom.png" class="w-7 md:w-8" alt="Ryzcle Logo">
            <span class="font-semibold tracking-wide text-slate-900">Ryzcle Corp.</span>
        </a>

        <ul class="hidden md:flex items-center gap-10 text-sm text-gray-700 font-medium">
            <li><a href="main-page.html" target="_blank" class="hover:text-blue-600 transition">Home</a></li>
            <li><a href="Divisions/ryzcle-labs.html" target="_blank" class="hover:text-blue-600 transition">Labs</a></li>
            <li><a href="Divisions/ryzcle-technology.html" target="_blank" class="hover:text-blue-600 transition">Technology</a></li>
        </ul>

        <button @click="open = !open" class="md:hidden text-slate-900 focus:outline-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path x-show="!open" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                <path x-show="open" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>
    </nav>

    <div x-show="open" x-transition class="absolute top-full left-0 w-full bg-white border-b shadow-xl md:hidden">
        <ul class="flex flex-col p-6 gap-4 text-gray-700 font-medium text-center">
            <li><a href="main-page.html" class="block py-2">Home</a></li>
            <li><a href="Divisions/ryzcle-labs.html" class="block py-2">Labs</a></li>
            <li><a href="Divisions/ryzcle-technology.html" class="block py-2">Technology</a></li>
        </ul>
    </div>
</header>

<main class="flex-grow flex flex-col items-center justify-center text-center px-6 w-full max-w-4xl mx-auto">
    
    <section class="mb-8 md:mb-12">
        <h1 class="font-headline font-bold text-3xl sm:text-5xl md:text-6xl text-slate-900 leading-[1.1]">
            ENGINEERING THE <br>
            <span class="text-blue-600">NEXT EVOLUTION</span>
        </h1>
        
        <p class="mt-4 md:mt-6 text-slate-600 text-sm md:text-xl leading-relaxed max-w-xl mx-auto">
            Refining the core architecture. <span class="inline-block px-1.5 py-0.5 rounded bg-blue-50 text-blue-700 font-mono text-[0.85em] font-medium">Ryzcle Corp</span> is currently synchronizing its high-precision ecosystem. The future is being coded.
        </p>
    </section>

    <section class="w-full max-w-[300px] sm:max-w-md md:max-w-2xl">
        <div class="relative group">
            <div class="absolute -inset-1 bg-gradient-to-r from-blue-600/10 to-cyan-600/10 rounded-2xl blur opacity-30"></div>
            <img src="./images/Cover LinkedIn 2.png"
                class="relative w-full rounded-2xl shadow-xl border border-slate-200 object-cover"
                alt="Ryzcle Corp System">
        </div>
    </section>
</main>

<footer class="absolute bottom-6 w-full text-center text-slate-400 text-[9px] font-mono tracking-widest uppercase">
    © 2026 Ryzcle Corp. | High-Precision Engineering
</footer>

<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init({ once: true, duration: 900 });
</script>
</body>
</html>
