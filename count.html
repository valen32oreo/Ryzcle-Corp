<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryzcle Corp — Official Website</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
html, body {
    height: 100%;
    margin: 0;
    overflow: hidden; /* NO SCROLL */
}

/* Background Glow Layer */
body::before {
    content: "";
    position: absolute;
    width: 800px;
    height: 800px;
    background: radial-gradient(circle, rgba(59,130,246,0.25) 0%, transparent 70%);
    top: -200px;
    left: -200px;
    filter: blur(120px);
}

body::after {
    content: "";
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(37,99,235,0.25) 0%, transparent 70%);
    bottom: -150px;
    right: -150px;
    filter: blur(120px);
}
</style>
</head>

<body class="relative bg-gradient-to-br from-slate-950 via-slate-900 to-blue-950 flex items-center justify-center text-white">

<div class="relative z-10 text-center px-6 max-w-3xl backdrop-blur-md bg-white/5 border border-white/10 rounded-2xl p-10 shadow-2xl">

    <h1 class="text-5xl md:text-6xl font-bold mb-6 tracking-tight">
        Ryzcle Corp
    </h1>

    <p class="text-lg md:text-xl text-gray-300 mb-10 leading-relaxed">
        The official Laravel-powered technology holding company.
        Built with modern architecture, scalable systems,
        and enterprise-level performance.
    </p>

    <a href="https://YOUR-LARAVEL-DOMAIN.COM"
       class="bg-blue-600 hover:bg-blue-700 transition px-8 py-3 rounded-xl font-semibold shadow-lg">
       Visit Official Website
    </a>

</div>

</body>
</html>
